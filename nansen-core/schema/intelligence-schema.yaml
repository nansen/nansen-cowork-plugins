# Nansen Intelligence File Schema
# All intelligence files use YAML frontmatter + markdown body
# This schema defines the required and optional frontmatter fields

required_fields:
  title:
    type: string
    description: Descriptive title summarizing the intelligence content
    example: "Q1 2026 Digital Transformation Trends from Acme Strategy Session"

  date:
    type: date
    format: "YYYY-MM-DD"
    description: Date the source material was created or the meeting occurred

  source_type:
    type: enum
    values:
      - meeting-transcript
      - document
      - research
      - email
      - slack-thread
      - web-research
    description: Where this intelligence was extracted from

  domains:
    type: array
    description: Knowledge domains this intelligence belongs to
    values:
      - market-research
      - competitive-intel
      - client-intelligence
      - industry-trends
      - technology-signals
      - partnership-opportunities
      - team-insights
      - financial-intel
      - sales-intelligence
      - solutions-positioning

  version:
    type: integer
    default: 1
    description: Increments each time the file is meaningfully updated

  updated:
    type: datetime
    format: "ISO-8601"
    description: Timestamp of the last update

  updated_by:
    type: string
    description: Name of the person or skill that last updated this file

optional_fields:
  client:
    type: string
    description: Client slug (lowercase, hyphenated) or null for non-client intelligence
    example: "acme-corp"

  participants:
    type: array
    description: People involved in the source material
    example: ["Arnold Macauley", "Jane Smith", "Bob Chen"]

  related_files:
    type: array
    description: Filenames of related intelligence files for cross-referencing

  project:
    type: string
    description: Related project name if applicable

  confidence:
    type: enum
    values: [high, medium, low]
    description: How confident we are in the extracted insights

  summary:
    type: string
    description: One-paragraph executive summary

  industry:
    type: string
    description: Industry vertical slug (lowercase, hyphenated)
    example: "aerospace-manufacturing"

  scoring_signals:
    type: object
    description: >
      Playbook scoring signals extracted from the source material.
      Maps to the 6 criteria in the Client Portfolio Scorecard.
      Each key contains an array of specific evidence sentences.
      Only include criteria with genuine signals; empty arrays are fine.
    properties:
      growth_potential:
        type: array
        description: Signals about budget expansion, new projects, platform upgrades, multi-year planning
      strategic_fit:
        type: array
        description: Signals about alignment with Nansen services, capability matches, shared goals
      relationship_quality:
        type: array
        description: Signals about exec access, trust, advocacy, referrals, warmth
      engagement_level:
        type: array
        description: Signals about responsiveness, proactive requests, collaboration depth, frequency
      budget_profitability:
        type: array
        description: Signals about budget numbers, value perception, pricing, scope, margins
      innovation_openness:
        type: array
        description: Signals about reaction to new ideas, AI appetite, experimentation, early adoption
    example:
      growth_potential: ["Phase 2 discussion mentioned for Q2"]
      strategic_fit: ["CMS 13 upgrade aligns with Nansen Optimizely practice"]
      relationship_quality: ["Direct access to VP Marketing"]
      engagement_level: []
      budget_profitability: ["Current retainer at $15k/month"]
      innovation_openness: ["Enthusiastic about AI content pilot"]

  growth_tracker_signals:
    type: object
    description: >
      Operational signals for the Client Growth Tracker spreadsheet.
      Extracted during sync to feed the growth-tracker population skill.
    properties:
      expansion_opportunities:
        type: array
        description: Specific upsell/cross-sell opportunities mentioned
      health_indicators:
        type: enum
        values: [positive, neutral, concerning]
        description: Overall health signal from this source
      health_notes:
        type: string
        description: Brief note explaining the health indicator
      relationship_indicators:
        type: array
        description: Tags like direct-exec-access, advocacy, referral, escalation-risk
      qbr_mention:
        type: boolean
        description: Whether a QBR was mentioned or scheduled
      revenue_signals:
        type: array
        description: Any revenue, budget, or financial figures mentioned

# Filename convention
# Pattern: YYYY-MM-DD_client-slug_source-type_title-slug.intelligence.md
# Examples:
#   2026-02-15_acme-corp_meeting-transcript_q1-strategy-session.intelligence.md
#   2026-02-20_internal_research_ai-agent-market-landscape.intelligence.md
#   2026-03-01_teledyne_email_project-kickoff-details.intelligence.md
#
# Rules:
#   - All lowercase, hyphens instead of spaces
#   - Client slug is "internal" for non-client intelligence
#   - Title slug is max 6 words, capturing the essence
#   - .intelligence.md extension identifies these files in the ecosystem
